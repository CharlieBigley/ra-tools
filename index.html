<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Joomla Sites - MAMP Switcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .site-grid {
            display: grid;
            gap: 15px;
        }
        .site-link {
            display: flex;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .site-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .site-link.admin {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        .site-link.admin:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }
        .icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .site-info {
            flex: 1;
        }
        .site-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .site-path {
            font-size: 12px;
            opacity: 0.9;
        }
        .arrow {
            font-size: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Local Joomla Development</h1>
        <p class="subtitle">Select a site to open (opens in new tab)</p>
        
        <div class="site-grid">
            <a href="/index.php" target="_blank" class="site-link">
                <div class="icon">🏠</div>
                <div class="site-info">
                    <div class="site-name">Main Joomla Site</div>
                    <div class="site-path">/htdocs</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="/vietnam/index.php" target="_blank" class="site-link">
                <div class="icon">🇻🇳</div>
                <div class="site-info">
                    <div class="site-name">Vietnam Joomla</div>
                    <div class="site-path">/htdocs/vietnam</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="/lanzarote/index.php" target="_blank" class="site-link">
                <div class="icon">🏝️</div>
                <div class="site-info">
                    <div class="site-name">Lanzarote Joomla</div>
                    <div class="site-path">/htdocs/lanzarote</div>
                </div>
                <div class="arrow">→</div>
            </a>
            
            <a href="/phpmyadmin" target="_blank" class="site-link admin">
                <div class="icon">🗄️</div>
                <div class="site-info">
                    <div class="site-name">phpMyAdmin</div>
                    <div class="site-path">Database Management</div>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>
    </div>
</body>
</html>
